  <script>
    const DATA_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
    const CAZE_URL = 'https://www.youtube.com/@CazeTV';
    const COPA_FINAL = new Date('2026-07-20');

    function toBRT(timeStr, dateStr) {
      if (!timeStr || !dateStr) return null;
      const mt = timeStr.match(/(\d{2}):(\d{2})/);
      const tz = timeStr.match(/UTC([+-]\d+)/);
      if (!mt || !tz) return null;
      const h = parseInt(mt[1]), m = parseInt(mt[2]);
      const offset = parseInt(tz[1]);
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCHours(h - offset, m, 0, 0);
      return d;
    }

    const FLAGS = {
      'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿',
      'Canada':'🇨🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭','Bosnia & Herzegovina':'🇧🇦',
      'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
      'USA':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷',
      'Germany':'🇩🇪','Ivory Coast':'🇨🇮','Curaçao':'🇨🇼','Ecuador':'🇪🇨',
      'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
      'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
      'Spain':'🇪🇸','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾','Cape Verde':'🇨🇻',
      'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
      'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
      'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
      'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
    };

    const PHASE_MAP = {
      'Round of 32':'32 Avos','Round of 16':'Oitavas','Quarter-final':'Quartas',
      'Semi-final':'Semifinal','Match for third place':'3º Lugar','Final':'Final',
    };

    const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    function flag(t) { return FLAGS[t] || '🏳️'; }

    function phase(m) {
      return m.group ? m.group.replace('Group','Grupo').trim() : (PHASE_MAP[m.round] || m.round);
    }

    function parseTime(t, d) {
      if (!t) return '';
      const brt = toBRT(t, d);
      if (brt) {
        const brtLocal = new Date(brt.getTime() - 3 * 3600000);
        return `${String(brtLocal.getUTCHours()).padStart(2,'0')}:${String(brtLocal.getUTCMinutes()).padStart(2,'0')} BRT`;
      }
      const mt = t.match(/(\d{2}:\d{2})/);
      return mt ? mt[1] : '';
    }

    function parseScore(m) {
      if (m.score && m.score.ft) {
        const [h,a] = m.score.ft;
        if (typeof h === 'number' && typeof a === 'number') return { home: h, away: a, ht: m.score.ht || null };
      }
      return null;
    }

    function fmtDate(dateStr, timeStr) {
      if (!dateStr) return '';
      const brt = toBRT(timeStr, dateStr);
      if (brt) {
        const brtLocal = new Date(brt.getTime() - 3 * 3600000);
        const day = String(brtLocal.getUTCDate()).padStart(2,'0');
        const month = brtLocal.getUTCMonth();
        const year = brtLocal.getUTCFullYear();
        const week = brtLocal.getUTCDay();
        return `${day} de ${MONTHS[month]} de ${year}, ${WEEKDAYS[week]}`;
      }
      const dt = new Date(dateStr + 'T12:00:00');
      return `${String(dt.getDate()).padStart(2,'0')} de ${MONTHS[dt.getMonth()]} de ${dt.getFullYear()}, ${WEEKDAYS[dt.getDay()]}`;
    }

    function resolveName(p, matches) {
      if (!p || p.length<2) return p;
      if (p.startsWith('W')) {
        const n = parseInt(p.slice(1));
        const m = matches.find(x=>x.num===n);
        if (m) { const s=parseScore(m); if(s) return s.home>s.away?m.team1:s.away>s.home?m.team2:p; }
        return `Vencedor #${n}`;
      }
      if (p.startsWith('L')) {
        const n = parseInt(p.slice(1));
        const m = matches.find(x=>x.num===n);
        if (m) { const s=parseScore(m); if(s) return s.home<s.away?m.team1:s.away<s.home?m.team2:p; }
        return `Perdedor #${n}`;
      }
      if (/^\d+[A-Z]$/.test(p)) return `Classificado ${p}`;
      return p;
    }

    function getSlug(m,i) {
      const a=m.team1.replace(/[^a-zA-Z0-9]/g,''), b=m.team2.replace(/[^a-zA-Z0-9]/g,'');
      return m.num ? `m${m.num}` : `${m.date}-${a}-${b}-${i}`;
    }

    function computeGroup(gid, matches) {
      const gms = matches.filter(m=>m.group===`Group ${gid}`&&parseScore(m));
      const teams={};
      gms.forEach(m=>{[m.team1,m.team2].forEach(t=>{if(!teams[t])teams[t]={name:t,pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0}})});
      gms.forEach(m=>{
        const s=parseScore(m); if(!s)return;
        const h=teams[m.team1],a=teams[m.team2]; if(!h||!a)return;
        h.gf+=s.home;h.ga+=s.away;a.gf+=s.away;a.ga+=s.home;
        if(s.home>s.away){h.pts+=3;h.w++;a.l++}
        else if(s.home<s.away){a.pts+=3;a.w++;h.l++}
        else{h.pts++;a.pts++;h.d++;a.d++}
      });
      Object.values(teams).forEach(t=>{t.gd=t.gf-t.ga});
      return Object.values(teams).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
    }

    function updateMatchMeta(slug, m) {
      const s = parseScore(m);
      const home = m.team1, away = m.team2;
      const score = s ? `${s.home} - ${s.away}` : 'A definir';
      const title = `${home} × ${away} — ${phase(m)} — Copa do Mundo 2026`;
      const desc = `${home} × ${away} — ${score} — ${fmtDate(m.date, m.time)}. Acompanhe o jogo da Copa do Mundo 2026.`;
      document.title = title;
      setMeta('description', desc);
      setMeta('keywords', `copa 2026, ${home}, ${away}, ${phase(m)}, futebol, resultado`);
      setMeta('og:title', title);
      setMeta('og:description', desc);
      setMeta('og:url', `https://cleitoncotrin.github.io/copa-2026/jogo.html?slug=${encodeURIComponent(slug)}`);
      setMeta('twitter:title', title);
      setMeta('twitter:description', desc);

      const canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.href = `https://cleitoncotrin.github.io/copa-2026/jogo.html?slug=${encodeURIComponent(slug)}`;

      const ldEvent = {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": `${home} × ${away}`,
        "description": desc,
        "startDate": m.date + 'T' + (m.time ? m.time.split(' ')[0] : '00:00'),
        "location": {"@type":"Place","name":m.ground||'Estádio'},
        "competitor": [
          {"@type":"SportsTeam","name":home},
          {"@type":"SportsTeam","name":away}
        ]
      };
      if (s) {
        ldEvent.competitor[0].score = s.home;
        ldEvent.competitor[1].score = s.away;
      }
      const existing = document.getElementById('ld-event');
      if (existing) existing.textContent = JSON.stringify(ldEvent);

      const ldBreadcrumb = {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {"@type":"ListItem","position":1,"name":"Copa 2026","item":"https://cleitoncotrin.github.io/copa-2026/"},
          {"@type":"ListItem","position":2,"name":`${home} × ${away}`}
        ]
      };
      const existingBc = document.getElementById('ld-breadcrumb');
      if (existingBc) existingBc.textContent = JSON.stringify(ldBreadcrumb);
    }

    function setMeta(prop, val) {
      let el = document.querySelector(`meta[property="${prop}"]`) || document.querySelector(`meta[name="${prop}"]`);
      if (el) { el.content = val; return; }
      el = document.createElement('meta');
      if (prop.startsWith('og:')) el.setAttribute('property', prop);
      else el.setAttribute('name', prop);
      el.content = val;
      document.head.appendChild(el);
    }

    async function load() {
      const slug = new URLSearchParams(window.location.search).get('slug');
      const el = document.getElementById('content');
      if (!slug) { el.innerHTML='<div class="loading-state"><p style="color:var(--red);">Nenhum jogo especificado.</p></div>'; return; }

      try {
        const r = await fetch(DATA_URL);
        if (!r.ok) throw Error('HTTP '+r.status);
        const json = await r.json();
        let raw = json.matches;

        raw.forEach(m => {
          if (!m.round.startsWith('Matchday')) {
            m.team1 = resolveName(m.team1, raw) || m.team1;
            m.team2 = resolveName(m.team2, raw) || m.team2;
          }
        });

        let found = null;
        for (let i=0;i<raw.length;i++) {
          if (getSlug(raw[i],i)===slug) { found={m:raw[i],idx:i}; break; }
        }
        if (!found) { el.innerHTML='<div class="loading-state"><p style="color:var(--red);">Jogo não encontrado.</p></div>'; return; }

        updateMatchMeta(slug, found.m);
        renderDetail(found.m, found.idx, raw, slug);
      } catch(e) {
        el.innerHTML='<div class="loading-state"><p style="color:var(--red);">Erro ao carregar dados. <a href="/" style="color:var(--accent-primary);">Voltar</a></p></div>';
      }
    }

    function renderDetail(m, idx, all, matchSlug) {
      const s = parseScore(m);
      const tm = parseTime(m.time, m.date);
      const dt = fmtDate(m.date, m.time);
      const G = m.group ? m.group.replace('Group ','') : null;

      const homeGoals = (m.goals1||[]).map(g=>({...g,team:m.team1}));
      const awayGoals = (m.goals2||[]).map(g=>({...g,team:m.team2}));
      const allGoals = [...homeGoals, ...awayGoals].sort((a,b)=>parseInt(a.minute)-parseInt(b.minute));

      const nextHome = all.filter(x=>x.date!==m.date&&(x.team1===m.team1||x.team2===m.team1)).slice(0,3);
      const nextAway = all.filter(x=>x.date!==m.date&&(x.team1===m.team2||x.team2===m.team2)).slice(0,3);
      const nextAll = [...new Map([...nextHome,...nextAway].map(x=>[x.date+x.team1+x.team2,x])).values()].sort((a,b)=>{const ta=toBRT(a.time,a.date),tb=toBRT(b.time,b.date);if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return -1;return ta-tb;}).slice(0,4);

      let standings = null;
      if (G) standings = computeGroup(G, all);

      const container = document.getElementById('content');
      container.innerHTML = `
        <div class="detail-hero">
          <div class="detail-phase">${phase(m)}</div>
          <div class="detail-teams">
            <div class="detail-team">
              <span class="detail-team-flag" role="img" aria-label="Bandeira ${m.team1}">${flag(m.team1)}</span>
              <span class="detail-team-name">${m.team1}</span>
            </div>
            <span class="detail-vs" aria-hidden="true">×</span>
            <div class="detail-team">
              <span class="detail-team-flag" role="img" aria-label="Bandeira ${m.team2}">${flag(m.team2)}</span>
              <span class="detail-team-name">${m.team2}</span>
            </div>
          </div>
          <div class="detail-score ${s?'':'detail-score--tbd'}" aria-label="Placar: ${s ? `${s.home} a ${s.away}` : 'A definir'}">${s ? `${s.home} - ${s.away}` : 'A definir'}</div>
          ${s && s.ht ? `<div class="detail-score-ht">(${s.ht[0]} - ${s.ht[1]} no 1º tempo)</div>` : ''}
          <div class="detail-meta">
            <span class="detail-meta-item">🕒 ${dt} — ${tm}</span>
            <span class="detail-meta-item">🏟️ ${m.ground||'—'}</span>
          </div>
        </div>

        ${new Date() < COPA_FINAL ? `
        <div class="section-block stream-section">
          <div class="section-header">
            <span class="stream-dot" aria-hidden="true"></span>
            <span class="section-header-icon" aria-hidden="true">▶️</span>
            Assista na CazéTV
          </div>
          <div class="section-body">
            <a href="${CAZE_URL}" target="_blank" rel="noopener" class="stream-link" style="display:block;text-align:center;padding:1rem;border-radius:0.5rem;background:var(--accent-primary);color:#fff;font-weight:600;text-decoration:none;">▶ Abrir youtube.com/@CazeTV</a>
          </div>
        </div>
        ` : ''}

        <div class="section-block">
          <div class="section-header">
            <span class="section-header-icon" aria-hidden="true">⚽</span>
            Gols
          </div>
          <div class="section-body">
            ${allGoals.length ? `<ul class="goals-list">${allGoals.map(g=>`
              <li>
                <span class="goal-icon" aria-hidden="true">⚽</span>
                <span class="goal-min">${g.minute}'${g.penalty?' (pên)':''}${g.owngoal?' (contra)':''}</span>
                <span class="goal-player">${g.name}</span>
                <span class="goal-team">${flag(g.team)} ${g.team}</span>
              </li>
            `).join('')}</ul>` : `
            <div class="empty-state">
              <span class="empty-state-icon" aria-hidden="true">⚽</span>
              <div class="empty-state-title">Nenhum gol registrado</div>
              <div class="empty-state-desc">Os gols aparecerão aqui durante a partida.</div>
            </div>`}
          </div>
        </div>

        <div class="ad-container" id="ad-detail-top" role="complementary" aria-label="Anúncio"></div>

        <div class="section-block">
          <div class="section-header">
            <span class="section-header-icon" aria-hidden="true">📅</span>
            Próximos jogos
          </div>
          <div class="section-body">
            ${nextAll.length ? `<div class="next-matches-list">${nextAll.map(n=>{
              const ns=parseScore(n);
              return `<a href="jogo.html?slug=${encodeURIComponent(getSlug(n,all.indexOf(n)))}" class="next-match-item">
                <span class="next-match-date">${n.date?n.date.slice(5):''}</span>
                <span class="next-match-teams">
                  <span>${flag(n.team1)} ${n.team1}</span>
                  <span class="next-match-vs" aria-hidden="true">×</span>
                  <span>${flag(n.team2)} ${n.team2}</span>
                </span>
                <span style="font-family:var(--font-mono);font-weight:700;color:${ns?'var(--text-primary)':'var(--text-tertiary)'};">${ns?`${ns.home}-${ns.away}`:'—'}</span>
              </a>`}).join('')}</div>` : `
            <div class="empty-state">
              <span class="empty-state-icon" aria-hidden="true">📅</span>
              <div class="empty-state-title">Sem jogos futuros</div>
              <div class="empty-state-desc">Nenhum outro jogo encontrado para estas equipes.</div>
            </div>`}
          </div>
        </div>

        ${standings ? `
        <div class="section-block">
          <div class="section-header">
            <span class="section-header-icon" aria-hidden="true">🏆</span>
            Classificação — Grupo ${G}
          </div>
          <div class="section-body" style="padding:0;">
            <table class="standing-mini" aria-label="Classificação do Grupo ${G}">
              <thead><tr><th>#</th><th>Time</th><th>P</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead>
              <tbody>${standings.map((t,i)=>`
                <tr>
                  <td style="font-weight:700;${i<2?'color:var(--green);':''}">${i+1}</td>
                  <td><div class="team-c"><span class="flag-s">${flag(t.name)}</span>${t.name}</div></td>
                  <td style="font-weight:700;">${t.pts}</td>
                  <td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
                  <td>${t.gd>0?'+':''}${t.gd}</td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>
        </div>` : ''}
      `;
    }

    function setupTheme() {
      const btn = document.getElementById('themeBtn');
      const html = document.documentElement;
      const saved = localStorage.getItem('theme');
      if (saved) html.setAttribute('data-theme', saved);
      btn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }

    document.addEventListener('DOMContentLoaded', async ()=>{ setupTheme(); await load(); window.initAds?.(); });
  </script>
</body>
</html>
